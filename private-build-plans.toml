[buildPlans.RIosevka]
family = "R Iosevka"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

  [buildPlans.RIosevka.variants]
  inherits = "ss05"

    [buildPlans.RIosevka.variants.design]
    zero = "slashed"

[buildPlans.RIosevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.RIosevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.RIosevka.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.RIosevka.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.RIosevka.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.RIosevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.RIosevka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
